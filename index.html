<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>خلاص بقا صافي ي لبن</title>

<style>
body{
  background:linear-gradient(135deg,#ffd6e0,#ffeef3);
  text-align:center;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
}

h1{
  margin-top:90px;
  font-size:40px;
}

button{
  padding:15px 35px;
  font-size:22px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  transition:.3s;
}

#yes{
  background:#28a745;
  color:white;
}

#no{
  background:#ff4d6d;
  color:white;
  position:absolute;
}

/* الصور */
#trapImg, #yesImg{
  display:none;
  width:300px;
  border-radius:15px;
  animation:show 1s ease forwards;
  display: block;                  /* مهم عشان يبقى block */
  margin: 20px auto 10px auto;    /* يوسّط الصورة أفقياً ويعطي مسافة تحتها */
}

/* النص تحت الصورة */
#text{
  display:none;
  font-size:28px;
  color:#d6336c;
  text-align:center;   /* يوسّط النص تحت الصورة */
  margin-bottom:20px;
}

/* قلوب */
.heart{
  position:absolute;
  font-size:24px;
  animation:floatUp 4s linear forwards;
}

@keyframes floatUp{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-500px);opacity:0;}
}

@keyframes show{
  from{opacity:0; transform:scale(.6);}
  to{opacity:1; transform:scale(1);}
}

</style>
</head>

<body>

<h1>what do you like more?</h1>

<button id="yes">Boody</button>
<button id="no">Anything else</button>

<!-- صورة المفاجأة بعد 5 محاولات -->
<img id="trapImg" src="trap.jpg">
<!-- صورة نعم -->
<img id="yesImg" src="C:\Users\Softlaptop\Desktop\hhkk\image.jpeg">

<!-- النص تحت الصورة -->
<div id="text"></div>

<script>

let noBtn=document.getElementById("no");
let yesBtn=document.getElementById("yes");
let trapImg=document.getElementById("trapImg");
let yesImg=document.getElementById("yesImg");
let text=document.getElementById("text");

let tries=0;
let surpriseUsed=false;

/* وضع البداية */
resetGame();

/* زر لا يهرب */
noBtn.addEventListener("mouseover",()=>{
  tries++;

  if(!surpriseUsed && tries>=5){
    showTrap();
    return;
  }

  moveButton();
});

function moveButton(){
  let x=Math.random()*(window.innerWidth-120);
  let y=Math.random()*(window.innerHeight-60);

  noBtn.style.left=x+"px";
  noBtn.style.top=y+"px";
}

/* المفاجأة بعد 5 مرات */
function showTrap(){
  surpriseUsed=true;

  noBtn.style.display="none";
  yesBtn.style.display="none";

  trapImg.style.display="block";
  text.innerHTML="خلاص بقا خلي قلبك ابيض ينور";
  text.style.display="block";

  setTimeout(resetGame,2500);
}

/* الضغط على نعم */
yesBtn.onclick=function(){

  noBtn.style.display="none";
  yesBtn.style.display="none";

  yesImg.style.display="block";
  text.innerHTML="nouran , boody and el7ot متجيش علي تلاته اخوات ";
  text.style.display="block";

  /* قلوب */
  for(let i=0;i<40;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.top="85vh";
    heart.style.fontSize=(20+Math.random()*25)+"px";

    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),4000);
  }

}

/* إعادة اللعبة بدون تكرار المفاجأة */
function resetGame(){
  tries=0;

  trapImg.style.display="none";
  yesImg.style.display="none";
  text.style.display="none";

  noBtn.style.display="block";
  yesBtn.style.display="inline-block";

  moveButton();
}

</script>

</body>
</html>
